model_provider = "lmstudiospark"
model = "minimax-m2.5-reap-139b-a10b-i1"
model_reasoning_effort = "high"
approval_policy = "never"
sandbox_mode    = "danger-full-access"
personality = "friendly"

[model_providers.lmstudiospark]
name = "lmstudiospark"
base_url = "http://192.168.1.3:1234/v1"
stream_idle_timeout_ms = 10000000

[features]
view_image_tool = true

[mcp_servers]
[mcp_servers.context7]
args = ['-y', '@upstash/context7-mcp', '--api-key', 'REPLACE_WITH_CONTEXT7_API_KEY']
command = 'npx'
startup_timeout_sec = 20.0

[mcp_servers.mui]
args = ['-y', '@mui/mcp@latest']
command = 'npx'

[mcp_servers.deepwiki]
url = "https://mcp.deepwiki.com/mcp"
startup_timeout_sec = 20.0

[mcp_servers.code_info]
command = "npx"
args    = ["-y", "mcp-remote", "http://localhost:5010/mcp"]
startup_timeout_sec = 60

[mcp_servers.MCP_DOCKER]
command = 'docker'
args = ['mcp', 'gateway', 'run']

