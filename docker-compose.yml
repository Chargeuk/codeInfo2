services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
      args:
        HOME: ${HOME}
        CODEINFO_NPM_REGISTRY: ${CODEINFO_NPM_REGISTRY:-}
        CODEINFO_PIP_INDEX_URL: ${CODEINFO_PIP_INDEX_URL:-}
        CODEINFO_PIP_TRUSTED_HOST: ${CODEINFO_PIP_TRUSTED_HOST:-}
        CODEINFO_NODE_EXTRA_CA_CERTS: ${CODEINFO_NODE_EXTRA_CA_CERTS:-}
    image: codeinfo2-server
    network_mode: host
    env_file:
      - server/.env
      - server/.env.local
    environment:
      - CODEINFO_SERVER_PORT=5010
      - CODEINFO_CHAT_MCP_PORT=5011
      - CODEINFO_AGENTS_MCP_PORT=5012
      - CODEINFO_PLAYWRIGHT_MCP_URL=http://host.docker.internal:8932/mcp
      - CODEINFO_RUNTIME_COMPOSE_FILE=docker-compose.yml
      - CODEINFO_RUNTIME_SERVER_PORTS=5010,5011,5012
      - CODEINFO_RUNTIME_PLAYWRIGHT_PORT=8932
      - CODEINFO_RUNTIME_SOURCE_BIND_MOUNT_COUNT=0
      # Override to use host.docker.internal for ChromaDB
      - CODEINFO_LOG_FILE_PATH=/app/logs/server.log
      - CODEINFO_CHROMA_URL=http://host.docker.internal:8000
      - CODEINFO_CODEX_HOME=/app/codex
      - CODEINFO_CODEX_AGENT_HOME=/app/codex_agents
      - FLOWS_DIR=/app/flows-sandbox
      - CODEINFO_MONGO_URI=mongodb://host.docker.internal:27517/db?directConnection=true
      - GIT_CREDENTIAL_FORWARDER_SERVER=host.docker.internal:24875
      - CODEINFO_RUNTIME_UID=${CODEINFO_DOCKER_UID:-1000}
      - CODEINFO_RUNTIME_GID=${CODEINFO_DOCKER_GID:-1000}
      - CODEINFO_CORP_CERTS_DIR=${CODEINFO_CORP_CERTS_DIR:-}
      - CODEINFO_COMPOSE_WORKFLOW=${CODEINFO_COMPOSE_WORKFLOW:-}
      - CODEINFO_INTERPOLATION_SOURCE=${CODEINFO_INTERPOLATION_SOURCE:-}
      - CODEINFO_RUNTIME_ENV_FILE_SOURCE=${CODEINFO_RUNTIME_ENV_FILE_SOURCE:-}
      - CODEINFO_NODE_EXTRA_CA_CERTS=${CODEINFO_NODE_EXTRA_CA_CERTS:-}
      - CODEINFO_REFRESH_CA_CERTS_ON_START=${CODEINFO_REFRESH_CA_CERTS_ON_START:-}
    volumes:
      - ./logs:/app/logs
      - ${CODEINFO_HOST_INGEST_DIR:-/tmp}:${CODEINFO_CODEX_WORKDIR}:ro
      - ${CODEINFO_HOST_CODEX_HOME:-$HOME/.codex}:/host/codex:ro
      - '${CODEINFO_CORP_CERTS_DIR:-./certs/empty-corp-ca}:/usr/local/share/ca-certificates/codeinfo-corp:ro'
    depends_on:
      chroma:
        condition: service_started
      mongo:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:5010/health']
      interval: 10s
      timeout: 5s
      retries: 5
    extra_hosts:
      - 'host.docker.internal:host-gateway'

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
      args:
        # These are baked into the Vite bundle at build time; fall back to the local defaults if not provided.
        VITE_CODEINFO_API_URL: http://host.docker.internal:5010
        VITE_CODEINFO_LMSTUDIO_URL: ${VITE_CODEINFO_LMSTUDIO_URL:-http://host.docker.internal:1234}
        VITE_CODEINFO_LOG_FORWARD_ENABLED: true
        VITE_CODEINFO_LOG_MAX_BYTES: 32768
        CODEINFO_NPM_REGISTRY: ${CODEINFO_NPM_REGISTRY:-}
    image: codeinfo2-client
    ports:
      - '5001:5001'
    networks:
      - internal
    env_file:
      - client/.env
      - client/.env.local
    environment:
      - VITE_CODEINFO_API_URL=http://host.docker.internal:5010
      - VITE_CODEINFO_LMSTUDIO_URL=${VITE_CODEINFO_LMSTUDIO_URL:-http://host.docker.internal:1234}
      - VITE_CODEINFO_LOG_FORWARD_ENABLED=true
      - VITE_CODEINFO_LOG_MAX_BYTES=32768
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:5001']
      interval: 10s
      timeout: 5s
      retries: 5
    extra_hosts:
      - 'host.docker.internal:host-gateway'

  mongo:
    container_name: 'mongo_db_CodeInfo'
    image: mongo:8
    command: ['mongod', '--replSet', 'rs0', '--bind_ip_all', '--port', '27017']
    ports:
      - 27517:27017
    networks:
      - internal
    extra_hosts:
      - host.docker.internal:host-gateway
    healthcheck:
      test: echo "try { rs.status() } catch (err) { rs.initiate({_id:'rs0',members:[{_id:0,host:'localhost:27017'}]}) }" | mongosh --port 27017 --quiet
      interval: 5s
      timeout: 30s
      start_period: 0s
      start_interval: 1s
      retries: 30
    environment:
      MONGO_INITDB_DATABASE: db
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
      - ./mongo/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro

  chroma:
    image: chromadb/chroma:1.3.5
    environment:
      - IS_PERSISTENT=True
      - ANONYMIZED_TELEMETRY=False
      - CHROMA_OPEN_TELEMETRY__ENDPOINT=http://host.docker.internal:4317/
      - CHROMA_OPEN_TELEMETRY__SERVICE_NAME=chroma
    ports:
      - '8000:8000'
    networks:
      - internal
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/api/v1/heartbeat']
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - chroma-data:/data
    depends_on:
      - otel-collector
      - zipkin
    extra_hosts:
      - 'host.docker.internal:host-gateway'

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.111.0
    command: ['--config=/etc/otel-collector-config.yaml']
    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - '4317:4317'
      - '4318:4318'
    networks:
      - internal

  zipkin:
    image: openzipkin/zipkin
    ports:
      - '9411:9411'
    depends_on: [otel-collector]
    networks:
      - internal

  playwright-mcp:
    image: mcr.microsoft.com/playwright/mcp:latest
    user: '${CODEINFO_DOCKER_UID:-1000}:${CODEINFO_DOCKER_GID:-1000}'
    network_mode: host
    entrypoint: ['node', 'cli.js']
    command:
      [
        '--host',
        '0.0.0.0',
        '--headless',
        '--browser',
        'chromium',
        '--no-sandbox',
        '--isolated',
        '--port',
        '8932',
        '--allowed-hosts',
        '*',
      ]
    volumes:
      - playwright-output-main:/tmp/playwright-output
    extra_hosts:
      - 'host.docker.internal:host-gateway'

networks:
  internal:

volumes:
  chroma-data:
  mongo_data:
    external: false
  mongo_config:
    external: false
  playwright-output-main:
