model_reasoning_effort = "high"
model = "rdtand/Qwen3.6-35B-A3B-PrismaQuant-4.75bit-vllm"
codeinfo_openai_endpoint = "http://192.168.1.3:8011/v1|responses,completions"
approval_policy = "never"
sandbox_mode    = "danger-full-access"
personality = "friendly"
model_auto_compact_token_limit=190000
web_search_mode = "live" 

[features]
view_image_tool = true

[mcp_servers]
[mcp_servers.context7]
args = ['-y', '@upstash/context7-mcp', '--api-key', 'REPLACE_WITH_CONTEXT7_API_KEY']
command = 'npx'
startup_timeout_sec = 20.0

[mcp_servers.deepwiki]
url = "https://mcp.deepwiki.com/mcp"
startup_timeout_sec = 20.0

[mcp_servers.code_info]
command = "npx"
args    = ["-y", "mcp-remote", "http://localhost:${CODEINFO_CHAT_MCP_PORT}/mcp"]
startup_timeout_sec = 60
tool_timeout_sec = 1800

[projects]
[projects."/data"]
trust_level = "trusted"

[projects."/app/server"]
trust_level = "trusted"
